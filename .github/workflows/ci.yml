name: CI

# Gate every PR (and main) on the checks CodeRabbit can't run: real typecheck,
# the test suites, a full build, and the worldgen determinism fingerprint.
# On a push to main (a merged PR), `deploy-prod` then ships the game Worker to
# production — but only after `verify` passes.
on:
  pull_request:
  push:
    branches: [main]

# One run per ref; a new push cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: `verify` only reads the checkout and uses no secrets (so it
# runs on fork PRs); `deploy-prod` adds the Cloudflare secrets but runs ONLY on
# push-to-main, never on PRs/forks. Neither writes back to the repo, so pin the
# token to read-only rather than inheriting the repo default.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # pnpm BEFORE setup-node so the node cache can key on the pnpm store.
      # Version comes from the root package.json `packageManager` field.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Pinned exact via .nvmrc. The worldgen fingerprint depends on V8's
          # transcendental (sin/cos/…) results, which drift across Node patches
          # — this gate caught seed 0 diverging on 22.22.3 vs the reference's
          # 22.21.1. Bumping Node means regenerating world.fingerprint.txt.
          # (Also satisfies the game tests' Node >= 22.6 / strip-types need.)
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -w typecheck

      - name: Test
        run: pnpm -w test

      - name: Build
        run: pnpm -w build

      # Determinism gate: worldgen must stay byte-identical to the committed
      # hashes. Any drift near packages/shared/src/world.ts fails here (the rng
      # stream order is the client/server contract). See docs/plans/README.md.
      - name: Worldgen determinism fingerprint
        shell: bash
        run: |
          diff \
            <(pnpm --filter @worldspring/shared fingerprint | grep '^seed') \
            <(grep '^seed' packages/shared/scripts/world.fingerprint.txt) \
          && echo "worldgen fingerprint byte-identical ✓"

      # doc 10 prod-safety: TESTBED must reach the worker ONLY via preview.yml's
      # `--var TESTBED:1` on per-PR deploys — never baked into a committed wrangler
      # config (a value there would override the code default and leak the testbed
      # provisioning into prod). dist/worldspring/wrangler.json exists post-build.
      - name: Assert TESTBED is not baked into any wrangler config
        shell: bash
        run: |
          hits=$(grep -rIl TESTBED apps/game/wrangler.jsonc apps/game/dist/worldspring/wrangler.json 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::TESTBED found in a wrangler config ($hits) — it must arrive only via preview.yml --var, never baked in."
            exit 1
          fi
          echo "no TESTBED in wrangler config ✓"

  e2e:
    # The browser gate. `verify` runs the sim headlessly and never opens a page —
    # it cannot see a black screen. This job drives the BUILT worker in a real
    # Chromium (SwiftShader WebGL, real WebSockets) and asserts what the sim tests
    # structurally cannot: that a join actually puts triangles on screen, that the
    # webfonts resolve, that nothing overflows a 390px viewport, and — the reason
    # this exists — that a cold join AT NIGHT still renders the world.
    #
    # Runs alongside `verify` rather than after it: they fail for unrelated reasons
    # and a reviewer wants both answers at once.
    #
    # Not (yet) in deploy-prod's `needs`. The visual baselines are new; until they
    # have proven stable across a few weeks of PRs, a baseline hiccup must not be
    # able to block a production deploy. Tighten this once it has earned it.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # --with-deps pulls the system libs headless Chromium needs on a bare runner.
      # Chromium only: the suite asserts on OUR layout, not on cross-browser parity.
      - name: Install Chromium
        run: pnpm --filter @worldspring/game exec playwright install --with-deps chromium

      # THE VISUAL BASELINES ARE LINUX-CANONICAL and this container is the machine
      # that owns them. Font rasterization differs macOS↔Linux, so a baseline
      # committed from a laptop false-fails here forever — the same trap as the
      # worldgen fingerprint. To re-baseline, run this suite in CI, not locally.
      - name: E2E (build + real browser)
        run: pnpm --filter @worldspring/game test:e2e

      # On failure the diff images are the whole story — expected/actual/diff PNGs,
      # plus a trace you can scrub. Without these a red visual test is unactionable.
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-failures
          path: |
            apps/game/test-results/
            apps/game/playwright-report/
          retention-days: 7

  deploy-prod:
    # Production deploy of the game Worker. Gated on `verify` and run ONLY on a
    # push to main (a merged PR) — the `if` skips PRs, and forks never produce a
    # push event, so the Cloudflare secrets are never exposed to untrusted code.
    # Mirrors preview.yml's build + wrangler-action, but with NO --name (deploys
    # the prod `worldspring` Worker named in wrangler.jsonc) and NO --var TESTBED
    # (the official deploy is var-less so the doc-10 testbed never reaches prod;
    # keep_vars in wrangler.jsonc preserves an operator-set GAME_CONFIG across
    # deploys). The top-of-file concurrency cancels a superseded in-flight run,
    # so a burst of merges only ships the latest main. The site auto-deploys too
    # (deploy-web-prod below); the prober stays manual (`pnpm deploy:prober`).
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # No secret → skip cleanly (green), so this workflow doesn't fail before the
      # token is configured (matches preview.yml's gate).
      - name: Check for Cloudflare secret
        id: gate
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping prod deploy (see .github/workflows/README.md)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.ok == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - if: steps.gate.outputs.ok == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        if: steps.gate.outputs.ok == 'true'
        run: pnpm install --frozen-lockfile

      # Emits apps/game/dist/worldspring/{index.js,wrangler.json} + dist/client.
      - name: Build game
        if: steps.gate.outputs.ok == 'true'
        run: pnpm --filter @worldspring/game build

      - name: Deploy production worker
        id: deploy
        if: steps.gate.outputs.ok == 'true'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.99.0"
          workingDirectory: apps/game
          command: deploy -c dist/worldspring/wrangler.json

      - name: Summary
        if: steps.gate.outputs.ok == 'true'
        env:
          URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          echo "🚀 Deployed the **worldspring** game Worker to production." >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$URL" ]; then echo "URL: $URL" >> "$GITHUB_STEP_SUMMARY"; fi

  deploy-web-prod:
    # Production deploy of the SITE (apps/web -> the worldspring.games apex).
    # Mirrors deploy-prod (game): gated on verify + push-to-main + the CF secret,
    # a separate job so a site deploy failing never blocks the game deploy. Unlike
    # the per-PR preview (which STRIPS the custom_domain route so it lands on
    # workers.dev), this deploys the adapter-generated config as-is — WITH its
    # worldspring.games custom_domain route + the prod D1/KV bindings. keep_vars
    # is irrelevant here; OAuth secrets (issue #66) are set via `wrangler secret`
    # and survive deploys. Was manual (`pnpm deploy:web`) until this job.
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check for Cloudflare secret
        id: gate
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping web prod deploy (see .github/workflows/README.md)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.ok == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - if: steps.gate.outputs.ok == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        if: steps.gate.outputs.ok == 'true'
        run: pnpm install --frozen-lockfile

      # Emits apps/web/dist/server/{entry.mjs,wrangler.json} + dist/client. The
      # generated config carries the worldspring.games custom_domain route (prod).
      - name: Build web
        if: steps.gate.outputs.ok == 'true'
        run: pnpm --filter @worldspring/web build

      - name: Deploy production site
        id: deploy
        if: steps.gate.outputs.ok == 'true'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.99.0"
          workingDirectory: apps/web
          command: deploy -c dist/server/wrangler.json

      - name: Summary
        if: steps.gate.outputs.ok == 'true'
        env:
          URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          echo "🚀 Deployed the **worldspring-web** site to production (worldspring.games)." >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$URL" ]; then echo "URL: $URL" >> "$GITHUB_STEP_SUMMARY"; fi
