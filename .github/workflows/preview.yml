name: Preview

# Per-PR game preview. Each PR gets its OWN throwaway Worker `worldspring-pr-<N>`
# with its OWN Durable Object namespace (a fresh world) — so a preview never
# touches the production GameRoom/world, and a schema-changing PR can't trip the
# doc 04 M2 fail-closed wipe against real data. Torn down when the PR closes.
#
# Requires repo secrets CLOUDFLARE_API_TOKEN ("Edit Cloudflare Workers" scope)
# and CLOUDFLARE_ACCOUNT_ID. Fork PRs are skipped (no secrets).
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # No secrets → skip the rest cleanly (green, not red). Lets this very PR
      # pass before the token is added; the preview activates once it lands.
      - name: Check for Cloudflare secret
        id: gate
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping preview deploy (see .github/workflows/README.md)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.ok == 'true'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - if: steps.gate.outputs.ok == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        if: steps.gate.outputs.ok == 'true'
        run: pnpm install --frozen-lockfile

      # Emits apps/game/dist/worldspring/{index.js,wrangler.json} + dist/client.
      - name: Build game
        if: steps.gate.outputs.ok == 'true'
        run: pnpm --filter @worldspring/game build

      # Deploy the built config under a per-PR name. --name overrides the script
      # name; the v1 migration creates a fresh GameRoom DO namespace under it.
      - name: Deploy preview worker
        id: deploy
        if: steps.gate.outputs.ok == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.99.0"
          workingDirectory: apps/game
          command: >-
            deploy -c dist/worldspring/wrangler.json
            --name worldspring-pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL
        if: steps.gate.outputs.ok == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const marker = "<!-- worldspring-preview -->";
            const n = context.issue.number;
            const url = process.env.PREVIEW_URL;
            const body = [
              marker,
              "### 🎮 Game preview deployed",
              "",
              url ? `**Play it:** ${url}` : "_Deployed — the URL is in the Deploy step logs._",
              "",
              `Throwaway worker \`worldspring-pr-${n}\` with its own fresh world (isolated Durable Object). Updates on every push; deleted when this PR closes.`,
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: n,
            });
            // Only ever touch OUR own comment: the github-actions bot author
            // AND our hidden marker. Never overwrites CodeRabbit, other bots,
            // or humans (even if one quotes the marker).
            const prev = comments.find(
              (c) => c.user.login === "github-actions[bot]" && c.body.startsWith(marker),
            );
            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: prev.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: n, body,
              });
            }

  cleanup:
    if: >-
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Delete by worker NAME in an isolated dir. Do NOT use cloudflare/
      # wrangler-action here: with no prior `pnpm install` it falls back to
      # `npm i wrangler` in apps/game, which dies on the repo's `workspace:*`
      # deps (EUNSUPPORTEDPROTOCOL) — so the delete silently never ran and every
      # preview worker leaked. `npx wrangler` in runner.temp (an empty dir)
      # installs cleanly from the registry. `delete <name> --force` needs only
      # the name + token/account (no config or build); --force is required to
      # delete a Worker that owns a Durable Object namespace.
      - name: Delete preview worker
        id: delete
        continue-on-error: true
        working-directory: ${{ runner.temp }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4.99.0 delete worldspring-pr-${{ github.event.pull_request.number }} --force

      # Reflect the ACTUAL delete outcome — never claim a teardown that didn't
      # happen. Only touches our own bot+marker comment (never CodeRabbit/humans).
      - name: Comment teardown
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          DELETE_OUTCOME: ${{ steps.delete.outcome }}
        with:
          script: |
            const marker = "<!-- worldspring-preview -->";
            const n = context.issue.number;
            const ok = process.env.DELETE_OUTCOME === "success";
            const body = ok
              ? `${marker}\n### 🎮 Game preview\n\nTorn down — \`worldspring-pr-${n}\` deleted now that this PR is closed.`
              : `${marker}\n### 🎮 Game preview\n\n⚠️ Couldn't confirm teardown of \`worldspring-pr-${n}\` — it may already be gone, or may need a manual \`wrangler delete worldspring-pr-${n} --force\`. See the cleanup job logs.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: n,
            });
            const prev = comments.find(
              (c) => c.user.login === "github-actions[bot]" && c.body.startsWith(marker),
            );
            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: prev.id, body,
              });
            }
